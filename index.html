<style>
  :root{
    --bg:#FFFCF8; --text:#0C0C0C; --muted:#6B6B6B;
    --border:rgba(12,12,12,.14); --red:#C6121F;
    --font-display:"Archivo",system-ui,sans-serif;
    --font-mono:"IBM Plex Mono",ui-monospace,monospace;
  }
  @media (prefers-color-scheme: dark){
    :root{--bg:#1A1813; --text:#FFFCF8; --muted:#A89F92; --border:rgba(255,252,248,.16); --red:#F2453F;}
  }
  [data-theme="light"]{--bg:#FFFCF8; --text:#0C0C0C; --muted:#6B6B6B; --border:rgba(12,12,12,.14); --red:#C6121F;}
  [data-theme="dark"]{--bg:#1A1813; --text:#FFFCF8; --muted:#A89F92; --border:rgba(255,252,248,.16); --red:#F2453F;}

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0; background:var(--bg); color:var(--text);
    font-family:var(--font-mono); -webkit-font-smoothing:antialiased;
    display:flex; align-items:center; justify-content:center; padding:24px;}
  .skip-link{position:absolute; left:-999px;}
  main{max-width:560px; text-align:center;}
  .wordmark{font-family:var(--font-display); font-weight:900; text-transform:uppercase;
    letter-spacing:-.01em; font-size:clamp(2rem,7vw,3.25rem); line-height:1; margin:0 0 18px;}
  .tag{color:var(--muted); font-size:.95rem; line-height:1.6; margin:0 auto 32px; max-width:42ch;}
  .btn{display:inline-flex; align-items:center; gap:10px; text-decoration:none;
    font-family:var(--font-display); font-weight:800; text-transform:uppercase; letter-spacing:.06em;
    font-size:.85rem; padding:14px 26px; border-radius:8px;
    background:var(--text); color:var(--bg); border:1px solid var(--text);
    transition:transform .15s ease, opacity .15s ease;}
  .btn:hover{transform:translateY(-1px); opacity:.92;}
  .btn .arrow{color:var(--red);}
  .alt{margin-top:22px; font-size:.8rem;}
  .alt a{color:var(--muted); text-decoration:none; border-bottom:1px solid var(--border);}
  .alt a:hover{color:var(--text);}
</style>
