name: i18n — auto-translate FR → EN

# Dès qu'un contenu FR est ajouté/modifié sur main, ce workflow (re)traduit
# UNIQUEMENT sa jumelle anglaise sous /en/ et ouvre une Pull Request.
# Il ne touche jamais au site FR ni au reste du site : isolé, non bloquant.
# Prérequis : secret ANTHROPIC_API_KEY dans Settings → Secrets → Actions.

on:
  push:
    branches: [main]
    paths:
      - '**.html'
      - '!en/**'
  workflow_dispatch:
    inputs:
      files:
        description: "Pages FR à traduire (séparées par des espaces). Vide = pages changées du dernier commit."
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: i18n-translate
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Déterminer les pages FR à traduire
        id: pick
        run: |
          if [ -n "${{ github.event.inputs.files }}" ]; then
            FILES="${{ github.event.inputs.files }}"
          else
            FILES=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- '*.html' \
              | grep -vE '^en/|^coffre/|/_template\.html$|^404\.html$' || true)
          fi
          echo "Pages détectées :"; echo "$FILES"
          # passe la liste au step suivant (espaces -> une ligne)
          echo "files=$(echo $FILES | tr '\n' ' ')" >> "$GITHUB_OUTPUT"

      - name: Traduire via l'API Claude
        if: steps.pick.outputs.files != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/auto_translate.py ${{ steps.pick.outputs.files }}

      - name: Régénérer le sitemap bilingue
        if: steps.pick.outputs.files != ''
        run: python3 scripts/build_sitemap.py

      - name: Ouvrir une Pull Request
        if: steps.pick.outputs.files != ''
        uses: peter-evans/create-pull-request@v6
        with:
          branch: i18n/auto-translate
          title: "i18n: traduction EN auto des pages FR modifiées"
          commit-message: "i18n: auto-translate EN counterparts of changed FR pages"
          body: |
            Traduction EN générée automatiquement pour les pages FR ajoutées/modifiées.

            ⚠️ Relire avant de merger : ton, termes métier, et que le sélecteur de
            langue / les hreflang n'ont pas bougé.
          labels: i18n, automated
          delete-branch: true
