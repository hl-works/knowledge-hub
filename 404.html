<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Hugo Lahutte</title>
<meta name="robots" content="noindex, follow">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<meta name="theme-color" content="#FFFCF8" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1A1813" media="(prefers-color-scheme: dark)">
<script>(function(){try{var t=localStorage.getItem("kh-theme");if(t==="dark"||t==="light")document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
<style>
  :root{--bg:#FFFCF8;--text:#0C0C0C;--muted:#6B6B6B;--border:rgba(12,12,12,.14);--red:#C6121F;
    --font-display:"Archivo",system-ui,sans-serif;--font-mono:"IBM Plex Mono",ui-monospace,monospace;}
  @media (prefers-color-scheme: dark){:root{--bg:#1A1813;--text:#FFFCF8;--muted:#A89F92;--border:rgba(255,252,248,.16);--red:#F2453F;}}
  [data-theme="light"]{--bg:#FFFCF8;--text:#0C0C0C;--muted:#6B6B6B;--border:rgba(12,12,12,.14);--red:#C6121F;}
  [data-theme="dark"]{--bg:#1A1813;--text:#FFFCF8;--muted:#A89F92;--border:rgba(255,252,248,.16);--red:#F2453F;}
  *{box-sizing:border-box;}html,body{height:100%;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-mono);
    display:flex;align-items:center;justify-content:center;padding:24px;}
  main{max-width:480px;text-align:center;}
  .code{font-family:var(--font-display);font-weight:900;font-size:clamp(3rem,12vw,5rem);line-height:1;color:var(--red);margin:0;}
  p{color:var(--muted);line-height:1.6;margin:16px 0 28px;}
  .links a{color:var(--text);text-decoration:none;font-family:var(--font-display);font-weight:800;
    text-transform:uppercase;letter-spacing:.06em;font-size:.8rem;border-bottom:2px solid var(--red);padding-bottom:2px;}
  .links a+a{margin-left:24px;}
</style>
</head>
<body>
<main>
  <p class="code">404</p>
  <p>Cette page n'existe pas (ou plus).</p>
  <p class="links"><a href="/">Accueil</a><a href="/knowledge-hub/">Knowledge Hub</a></p>
</main>
</body>
</html>
